<script>

var PROXY = 'https://mac-tc-proxy.jennine.workers.dev';

var tcChildren = [];
var currentChildId = null;

var evOffset = 0;

var activeFilter = 'all';

var MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var TC = {academic:'ev-academic',social:'ev-social',sport:'ev-sport',holiday:'ev-holiday',parent:'ev-parent'};

var TL = {academic:'Academic',social:'Social',sport:'Sports',holiday:'Holiday',parent:'Parent Event'};

var CC = {academic:'',social:'social',sport:'sport',holiday:'holiday',parent:'parent'};

var events = [

 {date:'2026-05-02',name:'Spring Art Show',type:'social',time:'6:00 PM',loc:'Main Hall'},

 {date:'2026-05-07',name:'Kindergarten Orientation',type:'academic',time:'9:00 AM',loc:'Room 101'},

 {date:'2026-05-12',name:'Field Day',type:'sport',time:'All Day',loc:'Athletic Field'},

 {date:'2026-05-15',name:'Parent-Teacher Conferences',type:'parent',time:'3:00-7:00 PM',loc:'Classrooms'},

 {date:'2026-05-19',name:'Science Fair',type:'academic',time:'10:00 AM',loc:'Gymnasium'},

 {date:'2026-05-23',name:'Montessori Open House',type:'parent',time:'1:00 PM',loc:'Campus-wide'},

 {date:'2026-05-26',name:'Memorial Day - No School',type:'holiday',time:'All Day',loc:''},

 {date:'2026-05-29',name:'Graduation Ceremony',type:'academic',time:'2:00 PM',loc:'Auditorium'},

 {date:'2026-06-04',name:'End-of-Year Picnic',type:'social',time:'11:00 AM',loc:'School Grounds'},

 {date:'2026-06-05',name:'Last Day of School',type:'academic',time:'All Day',loc:''},

 {date:'2026-04-15',name:'Spring Break Begins',type:'holiday',time:'All Day',loc:''},

 {date:'2026-04-22',name:'Classes Resume',type:'academic',time:'8:00 AM',loc:''}

];

// Nav

document.getElementById('nav').addEventListener('click', function(e) {

 var tab = e.target.closest('.nav-tab');

 if (!tab) return;

 document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });

 tab.classList.add('active');

 var p = tab.getAttribute('data-panel');

 document.querySelectorAll('.panel').forEach(function(x) { x.classList.remove('active'); });

 document.getElementById('panel-' + p).classList.add('active');

 if (p === 'activity' && currentChildId) loadActivity(currentChildId);

 if (p === 'events') renderEvents();

});

function doConnect() {

 var errEl = document.getElementById('tc-err');

 errEl.textContent = 'Connecting...';

 fetch(PROXY + '/children')
  .then(function(r) {
   if (!r.ok) {
    throw new Error('Connection failed. Status: ' + r.status);
   }
   return r.json();
  })
  .then(function(children) {

   if (!Array.isArray(children) || !children.length) {
    errEl.textContent = 'Connected, but no children were found.';
    return;
   }

   document.getElementById('tc-box').style.display = 'none';

   var cb = document.getElementById('connected-box');
   cb.style.display = 'block';

   document.getElementById('connected-name').textContent = 'Connected to Transparent Classroom';
   document.getElementById('connected-info').textContent = 'Connected through MAC Portal';

   renderChildren(children);

   errEl.textContent = '';

  })
  .catch(function(e) {
   errEl.textContent = 'Could not connect: ' + e.message;
  });

}

function doDisconnect() {

 tcChildren = [];
 currentChildId = null;

 document.getElementById('tc-box').style.display = 'block';

 document.getElementById('connected-box').style.display = 'none';

 document.getElementById('child-chips').innerHTML = '';

 document.getElementById('activity-chips').innerHTML = '';

 document.getElementById('activity-content').innerHTML =
  '<div class="placeholder" id="activity-placeholder">' +
  '<div style="font-size:28px;margin-bottom:8px">&#128203;</div>' +
  '<div style="font-weight:700;color:var(--blue);margin-bottom:4px">Connect Transparent Classroom</div>' +
  '<div style="font-size:12px">Connect on the Dashboard tab to see activity here.</div>' +
  '</div>';

 document.getElementById('tc-err').textContent = '';

}

function loadChildren() {

 fetch(PROXY + '/children')
  .then(function(r) {
   if (!r.ok) {
    throw new Error('Children request failed. Status: ' + r.status);
   }
   return r.json();
  })
  .then(function(children) {
   renderChildren(children);
  })
  .catch(function(e) {
   console.warn('Children error:', e);
  });

}

function renderChildren(children) {

 if (!Array.isArray(children) || !children.length) return;

 tcChildren = children;

 var colors = ['#10069F','#7B1FA2','#D94F3D','#D4830A','#2E9E6F'];

 var h = '';

 children.forEach(function(c, i) {

  h += '<div class="chip' + (i===0?' active':'') + '" data-id="' + c.id + '">' +
   '<div class="chip-av" style="background:' + colors[i%colors.length] + '">' +
   (c.first_name||'?')[0] +
   '</div>' +
   ' ' + escapeHtml(c.first_name || 'Student') +
   (c.last_name ? ' ' + escapeHtml(c.last_name[0]) + '.' : '') +
   '</div>';

 });

 document.getElementById('child-chips').innerHTML = h;

 var h2 = '';

 children.forEach(function(c, i) {

  h2 += '<div class="chip' + (i===0?' active':'') + '" data-id="' + c.id + '">' +
   '<div class="chip-av" style="background:' + colors[i%colors.length] + '">' +
   (c.first_name||'?')[0] +
   '</div>' +
   ' ' + escapeHtml(c.first_name || 'Student') +
   '</div>';

 });

 document.getElementById('activity-chips').innerHTML = h2;

 document.getElementById('child-chips').onclick = function(e) {

  var chip = e.target.closest('.chip');

  if (!chip) return;

  document.querySelectorAll('#child-chips .chip').forEach(function(c) {
   c.classList.remove('active');
  });

  chip.classList.add('active');

  currentChildId = chip.getAttribute('data-id');

 };

 document.getElementById('activity-chips').onclick = function(e) {

  var chip = e.target.closest('.chip');

  if (!chip) return;

  document.querySelectorAll('#activity-chips .chip').forEach(function(c) {
   c.classList.remove('active');
  });

  chip.classList.add('active');

  currentChildId = chip.getAttribute('data-id');

  loadActivity(currentChildId);

 };

 currentChildId = children[0].id;

}

function loadActivity(childId) {

 var content = document.getElementById('activity-content');

 content.innerHTML = '<div class="loading">Loading activity...</div>';

 var d = new Date();

 d.setDate(d.getDate() - 30);

 var ds = d.toISOString().split('T')[0];

 fetch(PROXY + '/activity?child_id=' + encodeURIComponent(childId) + '&date_start=' + encodeURIComponent(ds))
  .then(function(r) {
   if (!r.ok) {
    throw new Error('Activity request failed. Status: ' + r.status);
   }
   return r.json();
  })
  .then(function(items) {

   if (!items || !items.length) {
    content.innerHTML = '<div class="placeholder"><div style="font-size:13px;color:var(--muted)">No recent activity found.</div></div>';
    return;
   }

   var h = '';

   items.slice(0,20).forEach(function(item) {

    var ds2 = item.date ? new Date(item.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

    h += '<div class="act-card">' +
     '<div class="act-meta">' +
     '<span class="act-date">' + escapeHtml(ds2) + '</span>' +
     '<span class="act-tag">Observation</span>' +
     '</div>' +
     '<div class="act-text">' + escapeHtml(item.text || 'No description') + '</div>' +
     '</div>';

   });

   content.innerHTML = h;

  })
  .catch(function(e) {

   content.innerHTML = '<div style="color:var(--red);font-size:13px;padding:16px">Error: ' + escapeHtml(e.message) + '</div>';

  });

}

function escapeHtml(value) {

 return String(value)
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&#039;');

}

function evNav(dir) { evOffset += dir; renderEvents(); }

function renderEvents() {

 var d = new Date(2026, 4 + evOffset, 1);

 var yr = d.getFullYear(), mo = d.getMonth();

 document.getElementById('events-title').textContent = MN[mo] + ' ' + yr;

 var types = ['all','academic','social','sport','holiday','parent'];

 var labels = {all:'All',academic:'Academic',social:'Social',sport:'Sports',holiday:'Holidays',parent:'Parent Events'};

 var fh = '';

 types.forEach(function(t) {

  fh += '<span class="filter' + (activeFilter===t?' active':'') + '" data-f="' + t + '">' + labels[t] + '</span>';

 });

 document.getElementById('event-filters').innerHTML = fh;

 document.getElementById('event-filters').onclick = function(e) {

  var f = e.target.getAttribute('data-f');

  if (!f) return;

  activeFilter = f;

  renderEvents();

 };

 var filtered = events.filter(function(ev) {

  var ed = new Date(ev.date);

  var sameMonth = ed.getFullYear() === yr && ed.getMonth() === mo;

  var sameType = activeFilter === 'all' || ev.type === activeFilter;

  return sameMonth && sameType;

 });

 filtered.sort(function(a,b) { return new Date(a.date) - new Date(b.date); });

 var html = '';

 if (!filtered.length) {

  html = '<div class="placeholder"><div style="font-size:13px;color:var(--muted)">No events found for this month.</div></div>';

 } else {

  filtered.forEach(function(ev) {

   var ed = new Date(ev.date);

   var day = ed.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

   html += '<div class="event-card ' + (CC[ev.type] || '') + '">' +
    '<div class="event-date">' + day + '</div>' +
    '<div class="event-main">' +
    '<div class="event-name">' + ev.name + '</div>' +
    '<div class="event-meta">' + ev.time + (ev.loc ? ' · ' + ev.loc : '') + '</div>' +
    '</div>' +
    '<span class="event-type ' + TC[ev.type] + '">' + TL[ev.type] + '</span>' +
    '</div>';

  });

 }

 document.getElementById('event-list').innerHTML = html;

}

renderEvents();

</script>
